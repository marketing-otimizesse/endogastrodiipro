name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - main # Trigger the workflow on pushes to the main branch

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Add permissions for GITHUB_TOKEN
permissions:
  contents: read # Allow the action to read your repository contents
  pages: write   # Allow the action to create deployments on GitHub Pages
  id-token: write # Allow the action to request an OIDC token

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Run build script
      run: node build.js

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs' # Upload the docs folder as an artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # This job depends on the 'build' job to complete
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
