<!-- contact section -->
<div class="contact-section style-two pt-100 pb-100">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-lg-8 col-md-12">
				<div class="contact_from upper10">
					<div class="dreamit-section-title text-center">
						<div class="dreamit-section-sub-title">
							<h5>Fale Conosco</h5>
						</div>
						<div class="dreamit-section-main-title">
							<h2>Estamos aqui para ajudar</h2>
						</div>
					</div>
					<form action="assets/js/ajax-mail.js" method="POST" id="dreamit-form">
						<div class="row">
							<div class="col-lg-6">
								<div class="form_box mb-2">
									<input class="form-control contact" type="text" name="name" placeholder="Nome">
								</div>
							</div>
							<div class="col-lg-6">
								<div class="form_box mb-2">
									<input  class="form-control contact" type="text" name="email" placeholder="E-mail">
								</div>
							</div>
							<div class="col-lg-12">
								<div class="form_box mb-1">
									<input  class="form-control contact" type="text" name="subject" placeholder="Assunto">
								</div>
							</div>
							<div class="col-lg-12">
								<div class="form_box pt-1">
									<textarea  class="form-control contact" name="message" id="message" cols="10" rows="5" placeholder="Sua Mensagem"></textarea>
								</div>
							</div>
							<div class="quote_btn text_center mt-2">
								<button class="btn" type="submit"> Enviar Mensagem </button>
							</div>
						</div>
					</form>
					<div id="status"></div>
				</div>
			</div>
		</div>
	</div>
</div>
